name: Purge Cloudflare cache

# Runs automatically AFTER GitHub Pages finishes publishing a new version.
# Using deployment_status (not push) guarantees Cloudflare re-fetches the NEW
# content, not the old cached copy. Requires two repo secrets:
#   CLOUDFLARE_ZONE_ID    - the zone id for purposelabstudio.com
#   CLOUDFLARE_API_TOKEN  - a token limited to Zone > Cache Purge > Purge
on:
  deployment_status:

permissions:
  contents: read

jobs:
  purge:
    # Only run when the github-pages deployment actually succeeded.
    if: >-
      github.event.deployment_status.state == 'success' &&
      github.event.deployment_status.environment == 'github-pages'
    runs-on: ubuntu-latest
    steps:
      - name: Purge everything from Cloudflare
        env:
          ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$ZONE_ID" ] || [ -z "$API_TOKEN" ]; then
            echo "Cloudflare secrets not set — skipping purge."
            exit 0
          fi
          resp=$(curl -sS -X POST \
            "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')
          echo "$resp"
          echo "$resp" | grep -q '"success":true' || { echo "Purge failed"; exit 1; }
          echo "Cloudflare cache purged."
