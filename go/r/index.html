<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Opening…</title>
<!-- Generic unfurl card (this page serves any app via query params, so it can't
     be app-specific). Per-app preset links (/go/<app>-<placement>) unfurl per app. -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="PurposeLab">
<meta property="og:title" content="PurposeLab apps">
<meta property="og:description" content="Calm, private, offline-first apps. No account, no ads.">
<meta property="og:image" content="https://purposelabstudio.com/og-default.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="PurposeLab apps">
<meta name="twitter:description" content="Calm, private, offline-first apps. No account, no ads.">
<meta name="twitter:image" content="https://purposelabstudio.com/og-default.png">
<script>window.goatcounter = { no_onload: true };</script>
<script data-goatcounter="https://purposelabstudio.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
<script>
(function () {
  var APPS = {"folio":{"name":"Folio","tagline":"A calm, private journal. One line a day.","icon":"/folio/icon.png","accent":"#A08560","android":"com.purposelab.folio","ios":"6781551692","default":"android"},"bplog":{"name":"BPLog","tagline":"Track your blood pressure, simply.","icon":"/bplog/icon.png","accent":"#C0504D","android":"com.purposelab.bplog","ios":null,"default":"android"},"hushly":{"name":"Hushly","tagline":"White noise for better baby sleep.","icon":"/hushly/icon.png","accent":"#5B7C99","android":"com.purposelab.hushly","ios":null,"default":"android"},"waterwise":{"name":"WaterWise","tagline":"A gentle water reminder, no ads.","icon":"/waterwise/icon.png","accent":"#3E8EA0","android":"com.purposelab.waterwise","ios":null,"default":"android"},"crumbs":{"name":"Crumbs","tagline":"Your second brain on WhatsApp.","icon":"/crumbs/icon.png","accent":"#6B8E5A","android":"com.purposelab.crumbs","ios":null,"default":"android"}};
  var GC = "https://purposelabstudio.goatcounter.com/count";
  var q = new URLSearchParams(location.search);
  var a = (q.get('a') || '').trim();
  // Attribution params. Accept the self-descriptive utm_* names (used by the
  // Folio app's share_links builder) and the short s/m/c aliases (on-page builder).
  var utmSource = (q.get('utm_source') || q.get('s') || '').trim();
  var utmMedium = (q.get('utm_medium') || q.get('m') || '').trim();
  var utmCampaign = (q.get('utm_campaign') || q.get('c') || '').trim();
  var utmTerm = (q.get('utm_term') || '').trim();
  var utmContent = (q.get('utm_content') || '').trim();
  var refRaw = (q.get('ref') || '').trim();
  var refNum = /^[0-9]+$/.test(refRaw) ? refRaw : '';  // Founding member number, digits only
  var app = APPS[a];
  // Synthesize a clean, per-campaign GoatCounter path (never the per-user ref).
  var gcPath = '/go/r/' + (a || 'unknown') + (utmSource ? '-' + utmSource : '') + (utmCampaign ? '-' + utmCampaign : '');
  try {
    new Image().src = GC + '?p=' + encodeURIComponent(gcPath)
      + '&t=' + encodeURIComponent(document.title)
      + '&r=' + encodeURIComponent(document.referrer)
      + '&rnd=' + Math.random().toString(36).slice(2);
  } catch (e) {}

  // Play delivers only ONE value to the installed app: the referrer param,
  // so pack every attribution field (utm_* + Founding ref) into it, then
  // single-encode the whole string onto the Play URL.
  function playReferrer() {
    return [
      utmSource ? 'utm_source=' + utmSource : '',
      utmMedium ? 'utm_medium=' + utmMedium : '',
      utmCampaign ? 'utm_campaign=' + utmCampaign : '',
      utmTerm ? 'utm_term=' + utmTerm : '',
      utmContent ? 'utm_content=' + utmContent : '',
      refNum ? 'ref=' + refNum : ''
    ].filter(Boolean).join('&');
  }
  // Apple campaign token: a single value, <=40 chars; it cannot carry the ref.
  function appleCt() {
    return (utmSource ? utmSource + '_' + utmCampaign : utmCampaign).slice(0, 40);
  }
  var PLAY = null, APPSTORE = null;
  if (app) {
    var refStr = playReferrer();
    PLAY = 'https://play.google.com/store/apps/details?id=' + app.android
      + (refStr ? '&referrer=' + encodeURIComponent(refStr) : '');
    APPSTORE = app.ios
      ? 'https://apps.apple.com/app/id' + app.ios + (utmCampaign ? '?ct=' + encodeURIComponent(appleCt()) : '')
      : null;
  }
  var ua = navigator.userAgent || '';
  var isIOS = /iPad|iPhone|iPod/.test(ua)
    || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  var isAndroid = /Android/.test(ua);
  var target = null;
  if (app) {
    if (isAndroid) target = PLAY;
    else if (isIOS && APPSTORE) target = APPSTORE;
  }
  if (target) { setTimeout(function () { location.replace(target); }, 120); return; }

  // Desktop / iOS-no-build / unknown app → render the landing.
  // Anchors are built with DOM APIs (not innerHTML) so reflected query params
  // can never inject markup, regardless of encoding.
  function storeLink(href, label) {
    var el = document.createElement('a');
    el.className = 'store';
    el.href = href;
    el.textContent = label;
    return el;
  }
  document.addEventListener('DOMContentLoaded', function () {
    var wrap = document.getElementById('landing');
    var buttons = document.getElementById('buttons');
    if (!app) {
      document.getElementById('name').textContent = 'App not found';
      document.getElementById('tag').textContent = 'Check the link and try again.';
      buttons.appendChild(storeLink('https://purposelabstudio.com/apps/', 'See all apps'));
      wrap.style.display = 'flex';
      return;
    }
    document.documentElement.style.setProperty('--accent', app.accent || '#A08560');
    var icon = document.getElementById('icon');
    icon.src = app.icon; icon.alt = app.name + ' icon';
    document.getElementById('name').textContent = app.name;
    document.getElementById('tag').textContent = app.tagline;
    buttons.appendChild(storeLink(PLAY, 'Get it on Google Play'));
    if (APPSTORE) buttons.appendChild(storeLink(APPSTORE, 'Download on the App Store'));
    wrap.style.display = 'flex';
  });
})();
</script>
<style>
  :root { --accent: #A08560; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #FAF6F0; color: #2D2A26; min-height: 100vh;
    display: flex; align-items: center; justify-content: center; padding: 24px; }
  a { color: var(--accent); }
  #landing { display: none; flex-direction: column; align-items: center; text-align: center; gap: 14px; max-width: 360px; }
  #landing img.icon { width: 84px; height: 84px; border-radius: 20px; box-shadow: 0 6px 20px rgba(45,42,38,.16); }
  #landing h1 { font-size: 22px; font-weight: 700; }
  #landing p.tag { color: #6E685E; font-size: 15px; }
  .store { display: inline-block; width: 100%; padding: 12px 18px; border-radius: 12px;
    background: var(--accent); color: #fff; text-decoration: none; font-weight: 600; font-size: 15px; }
  .store + .store { background: #2D2A26; margin-top: 10px; }
  #buttons { display: flex; flex-direction: column; width: 100%; margin-top: 4px; }
</style>
</head>
<body>
  <main id="landing">
    <img class="icon" id="icon" src="" alt="">
    <h1 id="name"></h1>
    <p class="tag" id="tag"></p>
    <div id="buttons"></div>
  </main>
</body>
</html>
