<meta name="robots" content="noindex, nofollow">
<title>Get Folio</title>
<!-- Open Graph / Twitter: makes a pasted link unfurl with a preview card on
     WhatsApp, Reddit, Discord, Substack, Medium, etc. Unfurl bots read these
     static tags; they don't run the JS redirect, so humans still get sent on. -->
<meta property="og:type" content="website">
<meta property="og:url" content="https://purposelabstudio.com/go/folio-li-dm">
<meta property="og:title" content="Folio">
<meta property="og:description" content="A calm, private journal. One line a day.">
<meta property="og:image" content="https://purposelabstudio.com/folio/icon.png">
<meta property="og:image:alt" content="Folio app icon">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Folio">
<meta name="twitter:description" content="A calm, private journal. One line a day.">
<meta name="twitter:image" content="https://purposelabstudio.com/folio/icon.png">
<!-- Privacy-friendly analytics (GoatCounter, no cookies). no_onload: we fire the
     hit manually below so it is sent before the redirect navigates away. -->
<script>window.goatcounter = { no_onload: true };</script>
<script data-goatcounter="https://purposelabstudio.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
<script>
(function () {
  var path = "/go/folio-li-dm";
  // Fire the click hit immediately via a pixel so it survives the redirect.
  try {
    new Image().src = "https://purposelabstudio.goatcounter.com/count"
      + '?p=' + encodeURIComponent(path)
      + '&t=' + encodeURIComponent(document.title)
      + '&r=' + encodeURIComponent(document.referrer)
      + '&rnd=' + Math.random().toString(36).slice(2);
  } catch (e) {}
  var ua = navigator.userAgent || '';
  var isIOS = /iPad|iPhone|iPod/.test(ua)
    || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  var isAndroid = /Android/.test(ua);
  var PLAY = "https://play.google.com/store/apps/details?id=com.purposelab.folio&referrer=utm_source%3Dlinkedin%26utm_medium%3Dsocial%26utm_campaign%3Dlinkedin_dm";
  var APPSTORE = "https://apps.apple.com/app/id6781551692?ct=linkedin_dm";
  var target = null;
  if (isAndroid) target = PLAY;
  else if (isIOS && APPSTORE) target = APPSTORE;
  if (target) {
    setTimeout(function () { location.replace(target); }, 120);
  } else {
    // Desktop, or iPhone when this app has no iOS build → show the landing.
    document.documentElement.setAttribute('data-mode', 'landing');
  }
})();
</script>
