<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Get WaterWise</title>
<!-- Privacy-friendly analytics (GoatCounter, no cookies). no_onload: we fire the
     hit manually below so it is sent before the redirect navigates away. -->
<script>window.goatcounter = { no_onload: true };</script>
<script data-goatcounter="https://purposelabstudio.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
<script>
(function () {
  var path = "/go/waterwise-li-post";
  // Fire the click hit immediately via a pixel so it survives the redirect.
  try {
    new Image().src = "https://purposelabstudio.goatcounter.com/count"
      + '?p=' + encodeURIComponent(path)
      + '&t=' + encodeURIComponent(document.title)
      + '&r=' + encodeURIComponent(document.referrer)
      + '&rnd=' + Math.random().toString(36).slice(2);
  } catch (e) {}
  var ua = navigator.userAgent || '';
  var isIOS = /iPad|iPhone|iPod/.test(ua)
    || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  var isAndroid = /Android/.test(ua);
  var PLAY = "https://play.google.com/store/apps/details?id=com.purposelab.waterwise&referrer=utm_source%3Dlinkedin%26utm_medium%3Dsocial%26utm_campaign%3Dlinkedin_post";
  var APPSTORE = null;
  var target = null;
  if (isAndroid) target = PLAY;
  else if (isIOS && APPSTORE) target = APPSTORE;
  if (target) {
    setTimeout(function () { location.replace(target); }, 120);
  } else {
    // Desktop, or iPhone when this app has no iOS build → show the landing.
    document.documentElement.setAttribute('data-mode', 'landing');
  }
})();
</script>
<noscript><meta http-equiv="refresh" content="0;url=https://play.google.com/store/apps/details?id=com.purposelab.waterwise&amp;referrer=utm_source%3Dlinkedin%26utm_medium%3Dsocial%26utm_campaign%3Dlinkedin_post"></noscript>
<style>
  :root { --accent: #3E8EA0; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #FAF6F0; color: #2D2A26; min-height: 100vh;
    display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  a { color: var(--accent); }
  .redirecting { text-align: center; color: #8A8175; font-size: 15px; }
  .landing { display: none; }
  html[data-mode="landing"] .redirecting { display: none; }
  html[data-mode="landing"] .landing {
    display: flex; flex-direction: column; align-items: center; text-align: center;
    gap: 14px; max-width: 360px;
  }
  .landing img.icon { width: 84px; height: 84px; border-radius: 20px; box-shadow: 0 6px 20px rgba(45,42,38,.16); }
  .landing h1 { font-size: 22px; font-weight: 700; }
  .landing p.tag { color: #6E685E; font-size: 15px; }
  .store {
    display: inline-block; width: 100%; padding: 12px 18px; border-radius: 12px;
    background: var(--accent); color: #fff; text-decoration: none; font-weight: 600;
    font-size: 15px;
  }
  .store + .store { background: #2D2A26; }
  .buttons { display: flex; flex-direction: column; gap: 10px; width: 100%; margin-top: 4px; }
  .qr { display: flex; flex-direction: column; align-items: center; gap: 6px; margin-top: 8px; }
  .qr svg { width: 148px; height: 148px; }
  .qr span { color: #8A8175; font-size: 13px; }
</style>
</head>
<body>
  <div class="redirecting">
    Opening WaterWise…
    <br><a href="https://play.google.com/store/apps/details?id=com.purposelab.waterwise&amp;referrer=utm_source%3Dlinkedin%26utm_medium%3Dsocial%26utm_campaign%3Dlinkedin_post">Tap here if it doesn't open.</a>
  </div>
  <main class="landing">
    <img class="icon" src="/waterwise/icon.png" alt="WaterWise icon">
    <h1>WaterWise</h1>
    <p class="tag">A gentle water reminder, no ads.</p>
    
    <div class="buttons">
        <a class="store" href="https://play.google.com/store/apps/details?id=com.purposelab.waterwise&amp;referrer=utm_source%3Dlinkedin%26utm_medium%3Dsocial%26utm_campaign%3Dlinkedin_post">Get it on Google Play</a>
    </div>
  </main>
</body>
</html>
